name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev only)
        # Core install proves the graceful-degradation path: the full graph,
        # memory, HITL, and tools run without the heavy optional integrations.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest --cov=orchestrator --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        # Upload once (from a single matrix leg) and never fail the build on a
        # Codecov hiccup — keeps the CI badge green even before the repo is
        # activated on codecov.io.
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
